<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">

<title>Kanban Task Management</title>

<script defer src="./initialData.js"></script>

</head>

<body>
 <!-- Navigation Sidebar: Contains the logo, navigation links for boards, and theme toggle. -->
<nav class="side-bar">
  <div id="side-logo-div">
    <h2>Kanban</h2>
  </div>

  <div class="boards-nav-links-div">
    <h4>ALL BOARDS (1)</h4>
    <button class="board-btn">Launch Career</button>
  </div>
</nav>
 <!-- Main Layout: Header with board title, add task button, and main content area for task columns. -->
<div id="layout">
<header>
<h2>Launch Career</h2>
</header>
<!-- Task Columns: Display tasks grouped by status (TODO, DOING, DONE). -->
<div class="container">

<main class="card-column-main">

<div class="column-div">
<!-- Todo column -->
<div class="column-head-div">
<span class="dot" id="todo-dot"></span>
<h4>TODO</h4>
</div>
<!-- Tasks will be dynamically inserted through javascript -->
<div class="tasks-container" id="todo-column"></div></div>
<!-- Doing Column -->
<div class="column-div">
<div class="column-head-div">
<span class="dot" id="doing-dot"></span>
<h4>DOING</h4>
</div>
<!-- JS insert task here -->
<div class="tasks-container" id="doing-column"></div>
</div>
<!-- Done Column -->
<div class="column-div">
<div class="column-head-div">
<span class="dot" id="done-dot"></span>
<h4>DONE</h4>
</div>
<div class="tasks-container" id="done-column"></div>
</div>
</main>
</div>
</div>
<!-- Modal Section -->
<div id="task-modal" class="modal hidden">
<div class="modal-content">
  <div class="intro-header">
<h3>Task</h3>
<!-- Title and close button div -->
<button id="close-modal"><i class="fa-solid fa-x fa-2xl" style="color: rgb(255, 50, 50);"></i></i></button>
</div>
<label>Title</label>
<input id="modal-title" type="text">
<!-- Editable task description -->
<label>Description</label>
<!-- Text area for task description -->
<textarea id="modal-description"></textarea>
<!-- Task status -->
<label>Status</label>

<select id="modal-status">
<option value="todo">To Do</option>
<option value="doing">Doing</option>
<option value="done">Done</option>
</select>

<button id="save-task">Save</button>


</div>

</div>

</body>
</html>
